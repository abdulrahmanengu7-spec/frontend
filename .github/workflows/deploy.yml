name: Deploy Vite Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install project dependencies
        run: npm install --include=dev --legacy-peer-deps

      - name: Force install Vite
        run: npm install --save-dev vite@latest @vitejs/plugin-react@latest --legacy-peer-deps

      - name: Build Vite project
        run: npx --yes vite@latest build
        env:
          VITE_API_URL: https://backend-blond-three-91.vercel.app

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
