<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback for BrowserRouter.
      // Keeps one path segment because this is a project page: /frontend/.
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        var repoBase = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        var routePath = l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/');
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          repoBase + '/?/' + routePath +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body>Redirecting...</body>
</html>
